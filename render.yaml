

services:
  # ── Backend Flask (API) ──────────────────────────────────────
  - type: web
    name: solardim-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./solardim.db
      - key: PYTHON_VERSION
        value: "3.11"
    # ⚠️ Pas de disque persistant (plan gratuit Render = pas de carte
    # bancaire requise). Conséquence : solardim.db repart VIDE à
    # chaque redéploiement du backend (voir message [DB] dans les
    # logs au démarrage). Si tu veux que les projets sauvegardés
    # survivent dans le temps, il faudra activer un disque payant
    # plus tard (Dashboard → service backend → Disks → Add Disk).

  # ── Frontend statique (HTML/CSS/JS) ──────────────────────────
  - type: web
    name: solardim-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /pages/app.html
